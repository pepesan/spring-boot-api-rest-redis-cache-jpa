spring:
  application:
    name: spring-boot-api-rest-redis-jpa
  datasource:
    url: "jdbc:h2:mem:devdb;DB_CLOSE_DELAY=-1"
    # url: "jdbc:h2:file:./data/devdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE"
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
      # ddl-auto: update
    show-sql: true
    open-in-view: false
  h2:
    console:
      enabled: true
      path: /h2-console
  data:
    redis:
      host: localhost
      port: 6379
